# Hardware watchdog for Raspberry Pi running GenWatch.
#
# The BCM2712 (Pi 5) and BCM2835/2837 (older Pi) expose a hardware
# watchdog at /dev/watchdog. The kernel driver (bcm2835_wdt) is loaded
# automatically on Raspberry Pi OS Bookworm and creates the device node
# on boot.
#
# These settings tell pid 1 (systemd) to pet the hardware watchdog
# periodically. If systemd itself hangs (kernel deadlock, OOM-killer
# storm, USB controller wedge, thermal panic), the SoC's watchdog
# circuit will hard-reset the Pi after the timeout. This is the only
# recovery mechanism that survives a kernel hang — the software
# watchdog on the GenWatch service can't restart pid 1.
#
# RuntimeWatchdogSec=15s — petted at 7.5s. Tolerates a brief CPU stall from
#   a heavy SQLite checkpoint or a flash hiccup, but a true hang triggers
#   reset within ~15 s. NOTE: the bcm2835_wdt hardware max is ~15-16 s, so
#   this sits at the ceiling — do NOT raise it (the kernel will clamp or
#   reject a larger value). The tradeoff is that a pathological SD-card I/O
#   stall on a heavily loaded box could trip a spurious reset; mitigate by
#   keeping the box's write load modest, not by lengthening the timeout.
#   install.sh verifies the *armed* value (RuntimeWatchdogUSec) is non-zero
#   after daemon-reexec; confirm it equals ~15 s with `wdctl`.
# RebootWatchdogSec / ShutdownWatchdogSec=2min — keep the watchdog armed
#   across a graceful shutdown/reboot so a stalled stop/unmount can't brick
#   the box mid-transition.
#
# To verify after install + reboot:
#   sudo systemctl show | grep -i watchdog
#   wdctl                # shows hardware watchdog status
#
# To disable temporarily (e.g. for kernel debugging):
#   sudo systemctl edit --runtime --force --full systemd-system-config
#   set RuntimeWatchdogSec=0

[Manager]
RuntimeWatchdogSec=15s
RebootWatchdogSec=2min
ShutdownWatchdogSec=2min
