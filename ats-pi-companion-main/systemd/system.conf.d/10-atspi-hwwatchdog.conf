# Hardware watchdog for the Raspberry Pi running the ATS-Pi companion.
#
# The ATS-Pi is the device that physically commands a live 600 A transfer
# switch, so it is the MORE safety-critical of the two Pis — yet its software
# watchdog (the atspi.service WatchdogSec=60 sd_notify ping) shares fate with
# the process and cannot restart pid 1. A kernel deadlock, OOM-killer storm,
# USB-controller wedge, or thermal panic would otherwise strand the Pi (and any
# latched relay) until a truck-roll power-cycle.
#
# These settings tell pid 1 (systemd) to pet the SoC hardware watchdog
# (bcm2835_wdt, auto-loaded on Raspberry Pi OS Bookworm at /dev/watchdog). If
# systemd itself hangs, the watchdog circuit hard-resets the Pi after the
# timeout. On reboot the companion comes up with NO commands asserted
# (ICD §9.3), and in the interim the ADAM host-watchdog (F1) releases the
# maintained relays — so the switch returns to its own automatic logic.
#
# RuntimeWatchdogSec=15s — petted at 7.5s. The bcm2835_wdt hardware max is
#   ~15-16 s, so this sits at the ceiling; do NOT raise it (the kernel clamps
#   or rejects larger values). The companion writes to disk only on transfer
#   events (low SD I/O), so a spurious reset from an I/O stall is unlikely.
# RebootWatchdogSec / ShutdownWatchdogSec=2min — keep the watchdog armed across
#   a graceful shutdown/reboot so a stalled stop/unmount can't brick the box.
#
# Verify after install + reboot:
#   sudo systemctl show | grep -i watchdog      # RuntimeWatchdogUSec non-zero
#   wdctl                                        # hardware watchdog status

[Manager]
RuntimeWatchdogSec=15s
RebootWatchdogSec=2min
ShutdownWatchdogSec=2min
